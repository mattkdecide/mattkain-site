<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First 90 Days at Adobe APAC — Matt Kain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; -webkit-font-smoothing: antialiased; }
  body {
    background: #0f0f10;
    color: #fff;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }
  .container { max-width: 1020px; margin: 0 auto; padding: 0 28px; }

  /* HEADER */
  header { border-bottom: 1px solid rgba(255,255,255,0.07); padding: 36px 0 30px; }
  .header-eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: #eb1000; margin-bottom: 12px;
  }
  h1 {
    font-size: clamp(26px, 4.5vw, 42px); font-weight: 800;
    letter-spacing: -0.025em; line-height: 1.15; color: #fff;
  }
  .header-meta {
    margin-top: 10px; font-size: 13px; color: rgba(255,255,255,0.4);
    display: flex; flex-wrap: wrap; gap: 0;
  }
  .header-meta span::after { content: ' · '; }
  .header-meta span:last-child::after { content: ''; }

  /* COUNTER */
  .counter-section { padding: 40px 0 36px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .counter-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 36px;
  }
  @media (max-width: 640px) { .counter-grid { grid-template-columns: repeat(2, 1fr); } }
  .counter-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 20px 22px;
  }
  .counter-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 7px;
  }
  .counter-value {
    font-size: 38px; font-weight: 800; letter-spacing: -0.04em;
    line-height: 1; color: #fff;
  }
  .counter-value.accent { color: #eb1000; }
  .counter-sub { font-size: 11px; color: rgba(255,255,255,0.28); margin-top: 5px; }

  /* PHASE BAR */
  .phase-bar-container { position: relative; }
  .phase-bar-labels {
    display: flex; justify-content: space-between; margin-bottom: 8px;
  }
  .pbl {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: rgba(255,255,255,0.25);
    flex: 1; text-align: center;
  }
  .pbl:first-child { text-align: left; }
  .pbl:last-child { text-align: right; }
  .pbl.active { color: #eb1000; }
  .phase-track {
    position: relative; height: 5px;
    background: rgba(255,255,255,0.07); border-radius: 3px;
  }
  .phase-fill {
    position: absolute; left: 0; top: 0; height: 100%;
    background: linear-gradient(90deg, #c50e00 0%, #eb1000 60%, #ff4433 100%);
    border-radius: 3px; transition: width 1s cubic-bezier(0.4,0,0.2,1);
  }
  .phase-milestone {
    position: absolute; top: 50%; transform: translate(-50%, -50%);
    width: 9px; height: 9px; border-radius: 50%;
    border: 2px solid #0f0f10; background: rgba(255,255,255,0.18);
    transition: background 0.4s;
  }
  .phase-milestone.reached { background: #eb1000; }
  .phase-cursor {
    position: absolute; top: 50%; transform: translate(-50%, -50%);
    width: 13px; height: 13px; border-radius: 50%;
    background: #fff; border: 2px solid #eb1000;
    box-shadow: 0 0 0 4px rgba(235,16,0,0.22);
    transition: left 1s cubic-bezier(0.4,0,0.2,1);
  }
  .phase-end-labels {
    display: flex; justify-content: space-between; margin-top: 9px;
  }
  .pel { font-size: 11px; color: rgba(255,255,255,0.2); }

  /* INTRO */
  .intro-section { padding: 44px 0 8px; }
  .intro-text {
    font-size: 16px; font-weight: 400; line-height: 1.75;
    color: rgba(255,255,255,0.65); max-width: 680px;
  }

  /* WEEKS */
  .weeks-section { padding: 52px 0 56px; }
  .section-eyebrow {
    font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: rgba(255,255,255,0.25); margin-bottom: 28px;
  }
  .phase-group { margin-bottom: 44px; }
  .phase-group-header {
    display: flex; align-items: center; gap: 10px;
    padding-bottom: 14px; margin-bottom: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .ph-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    background: rgba(255,255,255,0.15);
  }
  .ph-dot.active { background: #eb1000; }
  .ph-dot.complete { background: rgba(255,255,255,0.5); }
  .ph-name {
    font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: rgba(255,255,255,0.4);
  }
  .ph-name.active { color: #eb1000; }
  .ph-name.complete { color: rgba(255,255,255,0.7); }
  .ph-wks { font-size: 11px; color: rgba(255,255,255,0.2); margin-left: auto; }

  .weeks-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  @media (max-width: 680px) { .weeks-grid { grid-template-columns: 1fr; } }

  /* WEEK CARD */
  .week-card {
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px; overflow: hidden; cursor: pointer;
    background: rgba(255,255,255,0.02);
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .week-card:hover { border-color: rgba(255,255,255,0.13); background: rgba(255,255,255,0.04); }
  .week-card.past { opacity: 0.5; }
  .week-card.past:hover { opacity: 0.7; }
  .week-card.current {
    border-color: rgba(235,16,0,0.6);
    background: rgba(235,16,0,0.05);
    opacity: 1;
  }
  .week-card.current:hover { background: rgba(235,16,0,0.08); }
  .week-card.future { opacity: 0.38; }
  .week-card.future:hover { opacity: 0.6; }

  .week-head {
    display: flex; align-items: center; gap: 13px; padding: 14px 16px;
  }
  .wk-num {
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: rgba(255,255,255,0.25);
    width: 36px; flex-shrink: 0;
  }
  .week-card.current .wk-num { color: #eb1000; }
  .wk-info { flex: 1; min-width: 0; }
  .wk-theme {
    font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.8);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .week-card.current .wk-theme { color: #fff; }
  .wk-dates { font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 2px; }
  .wk-chevron {
    width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
    background: rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.22s;
  }
  .week-card.open .wk-chevron { transform: rotate(180deg); background: rgba(235,16,0,0.18); }
  .wk-chevron svg {
    width: 11px; height: 11px; fill: none;
    stroke: rgba(255,255,255,0.35); stroke-width: 2.2;
    stroke-linecap: round; stroke-linejoin: round;
  }
  .week-card.current .wk-chevron svg { stroke: rgba(255,255,255,0.65); }

  .now-badge {
    display: inline-block; margin-left: 7px;
    background: rgba(235,16,0,0.22); color: #ff6355;
    font-size: 9px; font-weight: 800; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 2px 7px; border-radius: 4px;
    vertical-align: middle;
  }

  .week-body {
    display: none; padding: 4px 16px 16px 65px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
